name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches:
      - develop
      - "feature/**"
      - "bugfix/**"
      - "internal/**"
      - "release/**"
      - "hotfix/**"

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install detect-secrets
      - name: Scan for new secrets
        run: |
          detect-secrets scan --baseline .secrets.baseline
          if [ $? -ne 0 ]; then
            echo "New secrets detected. Update the baseline or remove the secret."
            exit 1
          fi

  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build
      - name: Run tests when the project has real tests
        if: ${{ hashFiles('code/src/**/*.test.ts', 'code/src/**/*.test.tsx', 'code/e2e/**/*.spec.ts') != '' }}
        run: npm run test

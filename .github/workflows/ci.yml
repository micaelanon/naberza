name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main, "feature/**", "bugfix/**", "internal/**", "release/**", "hotfix/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: code/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  type-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: code/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npm run type-check

  unit-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: code/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npm run test:run

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: code/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npm run build

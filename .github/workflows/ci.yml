name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches:
      - develop
      - "feature/**"
      - "bugfix/**"
      - "internal/**"
      - "release/**"
      - "hotfix/**"

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install detect-secrets
      - run: detect-secrets scan > .secrets.baseline.tmp

  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build

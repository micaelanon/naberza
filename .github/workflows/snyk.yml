name: Snyk Security

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main, "feature/**", "bugfix/**", "internal/**", "release/**", "hotfix/**"]

jobs:
  snyk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code/package-lock.json
      - run: npm ci
      - name: Run Snyk dependency monitor
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: test --severity-threshold=high --sarif-file-output=snyk.sarif
      - name: Upload Snyk results to GitHub Code Scanning
        if: always() && hashFiles('code/snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: code/snyk.sarif
      - name: Warn when Snyk token is missing
        if: ${{ secrets.SNYK_TOKEN == '' }}
        run: |
          echo "SNYK_TOKEN no está configurado en los secrets del repo."
          echo "El workflow existe, pero el escaneo real no se ejecutará hasta añadirlo."

name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: pro
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Check Vercel secrets
        id: vercel-secrets
        shell: bash
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && [ -n "${{ secrets.VERCEL_ORG_ID }}" ] && [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy production to Vercel
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: |
          npm install --no-save vercel@latest
          npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
          npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
          npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Fail when Vercel is not configured
        if: steps.vercel-secrets.outputs.configured != 'true'
        run: |
          echo "Missing Vercel secrets for production deployment." >&2
          exit 1

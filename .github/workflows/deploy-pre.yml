name: Deploy Pre

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy-pre:
    runs-on: ubuntu-latest
    environment: pre
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Check Vercel secrets
        id: vercel-secrets
        shell: bash
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && [ -n "${{ secrets.VERCEL_ORG_ID }}" ] && [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy preview to Vercel
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: |
          npm install --no-save vercel@latest
          npx vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"
          npx vercel build --token="${{ secrets.VERCEL_TOKEN }}"
          npx vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Warn when Vercel is not configured
        if: steps.vercel-secrets.outputs.configured != 'true'
        run: |
          echo "Vercel secrets are missing. CI/build passed, but pre deployment was skipped."

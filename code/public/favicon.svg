<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fondo degradado -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo de fondo -->
  <rect width="64" height="64" rx="12" fill="url(#bgGradient)" />
  
  <!-- Icono: papeleta de tareas (checkmark + lista) -->
  <!-- Marco externo -->
  <rect x="18" y="14" width="28" height="36" rx="2" fill="none" stroke="white" stroke-width="2" />
  
  <!-- Línea de separación (encabezado) -->
  <line x1="18" y1="24" x2="46" y2="24" stroke="white" stroke-width="1.5" />
  
  <!-- Checkmark en el encabezado -->
  <path d="M 22 18 L 26 22 L 32 16" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Líneas de tareas (3 items) -->
  <line x1="24" y1="30" x2="40" y2="30" stroke="white" stroke-width="1" opacity="0.8" />
  <line x1="24" y1="38" x2="40" y2="38" stroke="white" stroke-width="1" opacity="0.8" />
  <line x1="24" y1="46" x2="40" y2="46" stroke="white" stroke-width="1" opacity="0.8" />
</svg>

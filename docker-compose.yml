version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: naberza-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-naberza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-naberza_dev}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-naberza}']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: naberza-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-naberza}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-naberza_dev}
      
      # NextAuth
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      AUTH_ADMIN_EMAIL: ${AUTH_ADMIN_EMAIL:-admin@naberza.local}
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD:-TestPassword123!}
      
      # Application
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000/api}
    ports:
      - '3000:3000'
    # NOTE: Volumes are disabled to use built image directly
    # For local development with hot-reload, use: npm run dev (outside Docker)
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
